name: Tests

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Run unit tests (no API calls)
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run unit tests
      run: go test ./internal/provider -v -short
    
    - name: Run go vet
      run: go vet ./...
    
    - name: Check code formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted. Please run 'go fmt ./...'"
          gofmt -s -l .
          exit 1
        fi
    

  # Run acceptance tests (with API calls), sharded across parallel runners.
  # Each shard runs a subset of TestAcc* tests on its own ubuntu-latest runner,
  # so wall-clock time is bounded by the slowest shard rather than the sum.
  acceptance-tests:
    name: acceptance-tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    needs: unit-tests
    environment: testing
    strategy:
      fail-fast: false
      matrix:
        shard:
          # Synthetic tests: large suite (~30+ tests), mostly parallel-safe.
          - name: synthetic
            run: '^TestAccSynthetic'
          # Connected app tests: 20+ tests kept sequential due to dev backend
          # contention. This is the dominant shard wall-clock-wise.
          - name: connected-app
            run: '^TestAccConnectedApp'
          # Everything else: notification routes, monitor, policy, dashboard,
          # api keys, ingestion keys, secrets, silence, service accounts,
          # data integration, logs/traces/metrics-aggregation pipelines.
          - name: rest
            run: '^TestAcc(ApiKey|Dashboard|DataIntegration|IngestionKey|LogsPipeline|MetricsAggregation|Monitor|NotificationRoute|Policy|Secret|ServiceAccount|Silence|Traces)'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Get Terraform path
      id: terraform-path
      run: echo "path=$(which terraform)" >> $GITHUB_OUTPUT

    - name: Check if secrets are available
      id: check-secrets
      run: |
        if [ -n "${{ secrets.GROUNDCOVER_API_KEY }}" ] && [ -n "${{ secrets.GROUNDCOVER_BACKEND_ID }}" ]; then
          echo "secrets-available=true" >> $GITHUB_OUTPUT
        else
          echo "secrets-available=false" >> $GITHUB_OUTPUT
        fi

    - name: Skip acceptance tests (secrets not available)
      if: steps.check-secrets.outputs.secrets-available == 'false'
      run: |
        echo "⚠️  Skipping acceptance tests - repository secrets not available"
        echo "This is expected for PRs from forks and doesn't indicate a failure"
        echo "Acceptance tests will run when the PR is merged"

    - name: Run acceptance tests
      if: steps.check-secrets.outputs.secrets-available == 'true'
      env:
        TF_ACC: 1
        TF_ACC_TERRAFORM_PATH: ${{ steps.terraform-path.outputs.path }}
        GROUNDCOVER_API_KEY: ${{ secrets.GROUNDCOVER_API_KEY }}
        GROUNDCOVER_API_URL: ${{ secrets.GROUNDCOVER_API_URL }}
        GROUNDCOVER_BACKEND_ID: ${{ secrets.GROUNDCOVER_BACKEND_ID }}
        GROUNDCOVER_INCLOUD_BACKEND_ID: ${{ secrets.GROUNDCOVER_INCLOUD_BACKEND_ID }}
        SHARD_RUN: ${{ matrix.shard.run }}
      run: |
        echo "✅ Running acceptance tests for shard '${{ matrix.shard.name }}' (regex: $SHARD_RUN)..."
        MAX_RETRIES=2
        # Only match true transient infrastructure errors. "resource not found"
        # was previously included to absorb dev-API router restarts, but it also
        # matches the provider's own ErrNotFound text — so a real Read-after-Create
        # bug would be silently retried instead of surfaced. Keep retries to HTTP
        # 5xx, connection drops, and EOFs.
        TRANSIENT_PATTERNS="503|502|504|Service Unavailable|Bad Gateway|Gateway Timeout|connection refused|connection reset|EOF"
        # First attempt runs the full shard regex; retry attempts narrow to failed tests.
        RUN_FILTER="$SHARD_RUN"

        for attempt in $(seq 0 $MAX_RETRIES); do
          echo "=== Test attempt $((attempt + 1)) of $((MAX_RETRIES + 1)) ==="
          LOG_FILE=$(mktemp)

          set +e
          go test ./internal/provider -v -failfast -parallel=6 -timeout 60m -run "$RUN_FILTER" 2>&1 | tee "$LOG_FILE"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Tests passed on attempt $((attempt + 1))"
            rm -f "$LOG_FILE"
            exit 0
          fi

          if grep -qE "$TRANSIENT_PATTERNS" "$LOG_FILE"; then
            if [ $attempt -lt $MAX_RETRIES ]; then
              # Extract failed test names for targeted retry. Anchor each name
              # with ^...$ so the regex doesn't accidentally match siblings —
              # e.g. retrying "TestAccFoo" without anchors would also rerun
              # "TestAccFoo_disappears", "TestAccFoo_withCluster", etc.
              FAILED_TESTS=$(grep -E "^--- FAIL:" "$LOG_FILE" | sed 's/--- FAIL: \([^ ]*\).*/^\1$/' | paste -sd'|' -)
              if [ -n "$FAILED_TESTS" ]; then
                RUN_FILTER="$FAILED_TESTS"
                echo "⚠️ Transient error detected. Retrying only failed tests: $FAILED_TESTS"
              else
                echo "⚠️ Transient error detected. Retrying full shard..."
                RUN_FILTER="$SHARD_RUN"
              fi
              SLEEP_TIME=$(( (attempt + 1) * 30 ))
              echo "Waiting ${SLEEP_TIME}s before retry..."
              sleep $SLEEP_TIME
              rm -f "$LOG_FILE"
              continue
            fi
          fi

          rm -f "$LOG_FILE"
          echo "❌ Non-transient failure or max retries reached."
          exit $EXIT_CODE
        done

  # Build test to ensure the provider compiles
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Build provider
      run: go build -v .
    
    - name: Test build with make
      run: make build


  # Dependency check
  dependency-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    
    - name: Verify dependencies
      run: |
        go mod verify
        go mod tidy
        git diff --exit-code go.mod go.sum
